<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PavithraBot — ChatGPT-style Data Tutor with Master Thalassos</title>

    <!-- Font: Inter (HP Design System substitute for Forma DJR Micro) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

    <!-- Chart.js (kept for optional use) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

    <!-- Load config.js (API key) — ignored by git -->
    <script src="config.js"></script>

    <style>
        /* ============================================================
           HP Design System — Applied to PavithraBot
           ============================================================ */

        /* ---------- RESET ---------- */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        /* ---------- CUSTOM PROPERTIES ---------- */
        :root {
            /* HP Brand Colors */
            --canvas: #ffffff;
            --cloud: #f7f7f7;
            --fog: #e8e8e8;
            --primary: #024ad8;          /* HP Electric Blue */
            --primary-hover: #0239b0;
            --primary-light: #e8f0fe;
            --ink: #1a1a1a;
            --charcoal: #3d3d3d;
            --on-ink: #ffffff;
            --hairline: #e8e8e8;
            --steel: #c2c2c2;

            /* Typography */
            --font-ui: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
            --font-code: 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace;

            /* Rounded (HP: cards 16px, buttons/inputs 4px) */
            --rounded-sm: 4px;
            --rounded-lg: 16px;

            /* Shadows */
            --shadow-lift: 0 2px 8px rgba(26,26,26,0.08);
            --shadow-heavy: 0 4px 16px rgba(26,26,26,0.12);

            /* Spacing (4px base) */
            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 24px;
            --space-8: 32px;
            --space-10: 40px;
            --space-12: 48px;
        }

        /* ---------- GLOBAL ---------- */
        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-ui);
            background: var(--canvas);
            color: var(--ink);
            line-height: 1.55;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* ---------- UTILITY STRIP (ink background, thin) ---------- */
        .utility-strip {
            width: 100%;
            height: 6px;
            background: var(--ink);
            flex-shrink: 0;
        }

        /* ---------- NAV BAR (white, HP logo + title) ---------- */
        .nav-bar {
            background: var(--canvas);
            border-bottom: 1px solid var(--hairline);
            height: 64px;
            display: flex;
            align-items: center;
            padding: 0 var(--space-8);
            flex-shrink: 0;
        }

        .nav-bar-inner {
            max-width: 1366px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-bar-brand {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            text-decoration: none;
            color: var(--ink);
        }

        .nav-bar-brand .brand-icon {
            width: 32px;
            height: 32px;
            background: var(--primary);
            border-radius: var(--rounded-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--on-ink);
            font-size: 18px;
            font-weight: 600;
        }

        .nav-bar-brand .brand-name {
            font-size: 20px;
            font-weight: 500;
            letter-spacing: 0;  /* HP: 0 tracking */
        }

        .nav-bar-brand .brand-name span {
            color: var(--primary);
        }

        .nav-bar-links {
            display: flex;
            gap: var(--space-6);
            list-style: none;
            align-items: center;
        }

        .nav-bar-links a {
            text-decoration: none;
            color: var(--charcoal);
            font-size: 14px;
            font-weight: 500;
            transition: color 0.15s;
        }

        .nav-bar-links a:hover {
            color: var(--ink);
        }

        /* ---------- APP LAYOUT ---------- */
        .app-layout {
            display: flex;
            flex: 1;
            max-width: 1366px;
            width: 100%;
            margin: 0 auto;
            padding: 0;
            min-height: 0;
        }

        /* ---------- SIDEBAR ---------- */
        .sidebar {
            width: 260px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            background: var(--canvas);
            border-right: 1px solid var(--hairline);
            padding: var(--space-6) 0;
            overflow-y: auto;
        }

        .sidebar-section {
            padding: 0 var(--space-5);
            margin-bottom: var(--space-6);
        }

        .sidebar-section:last-child {
            margin-bottom: 0;
        }

        .sidebar-section-header {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            margin-bottom: var(--space-3);
            color: var(--charcoal);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            position: relative;
        }

        /* HP Electric Blue chevron decoration */
        .sidebar-section-header::before {
            content: '';
            display: inline-block;
            width: 3px;
            height: 14px;
            background: var(--primary);
            border-radius: 2px;
            flex-shrink: 0;
        }

        .topic-btn {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            width: 100%;
            text-align: left;
            padding: var(--space-2) var(--space-5);
            border: none;
            background: transparent;
            border-radius: 0;
            font-family: var(--font-ui);
            font-size: 14px;
            font-weight: 400;
            color: var(--charcoal);
            cursor: pointer;
            transition: all 0.15s;
            border-left: 3px solid transparent;
        }

        .topic-btn:hover {
            background: var(--cloud);
            color: var(--ink);
        }

        .topic-btn.active {
            background: var(--primary-light);
            color: var(--primary);
            font-weight: 500;
            border-left-color: var(--primary);
        }

        .topic-btn .topic-icon {
            font-size: 14px;
            width: 20px;
            text-align: center;
            flex-shrink: 0;
        }

        .sidebar-divider {
            height: 1px;
            background: var(--hairline);
            margin: var(--space-3) var(--space-5);
        }

        /* Conversation history items in sidebar */
        .history-item {
            padding: var(--space-2) var(--space-5);
            font-size: 13px;
            color: var(--charcoal);
            cursor: pointer;
            transition: all 0.15s;
            border-left: 3px solid transparent;
            display: flex;
            align-items: center;
            gap: var(--space-2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item:hover {
            background: var(--cloud);
        }

        .history-item .history-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--primary);
            flex-shrink: 0;
            opacity: 0.6;
        }

        .history-item .history-label {
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ---------- MAIN CHAT AREA ---------- */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--cloud);
            min-height: 0;
            position: relative;
        }

        /* Chat Header */
        .chat-header {
            padding: var(--space-4) var(--space-8);
            border-bottom: 1px solid var(--hairline);
            background: var(--canvas);
            display: flex;
            align-items: center;
            gap: var(--space-3);
            flex-shrink: 0;
            box-shadow: var(--shadow-lift);
            z-index: 1;
        }

        .chat-header-avatar {
            width: 36px;
            height: 36px;
            background: var(--primary);
            border-radius: var(--rounded-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--on-ink);
            font-size: 16px;
            font-weight: 500;
            flex-shrink: 0;
        }

        .chat-header-info h2 {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0;
        }

        .chat-header-info p {
            font-size: 12px;
            color: var(--charcoal);
        }

        .chat-header-status {
            margin-left: auto;
            font-size: 12px;
            color: var(--charcoal);
            display: flex;
            align-items: center;
            gap: var(--space-1);
            font-weight: 500;
        }

        .chat-header-status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            background: #22c55e;
        }

        .chat-header-status .dot.offline {
            background: var(--steel);
        }

        /* ---------- MESSAGES ---------- */
        .chat-messages {
            flex: 1;
            padding: var(--space-6) var(--space-8);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: var(--space-4);
            scroll-behavior: smooth;
        }

        .message {
            max-width: 75%;
            padding: var(--space-3) var(--space-5);
            border-radius: var(--rounded-lg);
            line-height: 1.6;
            font-size: 15px;
            font-weight: 400;
            animation: msgIn 0.3s ease;
            position: relative;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Teacher message: white card on cloud background, left-aligned */
        .message.teacher {
            background: var(--canvas);
            align-self: flex-start;
            color: var(--ink);
            box-shadow: var(--shadow-lift);
        }

        .message.teacher .msg-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            color: var(--primary);
            margin-bottom: var(--space-2);
            display: flex;
            align-items: center;
            gap: var(--space-1);
        }

        /* User message: HP Electric Blue bubble, right-aligned */
        .message.learner {
            background: var(--primary);
            color: var(--on-ink);
            align-self: flex-end;
        }

        /* Inline code in messages */
        .message code {
            font-family: var(--font-code);
            font-size: 13px;
            background: rgba(0,0,0,0.06);
            padding: 1px 6px;
            border-radius: 3px;
        }

        .message.learner code {
            background: rgba(255,255,255,0.15);
        }

        /* Code blocks in messages */
        .message .code-block {
            font-family: var(--font-code);
            font-size: 13px;
            background: var(--ink);
            color: #e4e4e4;
            padding: var(--space-3) var(--space-4);
            border-radius: var(--rounded-sm);
            display: block;
            margin: var(--space-2) 0;
            white-space: pre-wrap;
            line-height: 1.5;
            overflow-x: auto;
        }

        .message .code-block .code-label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            color: var(--steel);
            margin-bottom: var(--space-2);
            font-family: var(--font-ui);
            font-weight: 600;
        }

        /* Data table in messages */
        .message .data-table-wrap {
            overflow-x: auto;
            margin: var(--space-2) 0;
        }

        .message .data-table-wrap table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .message .data-table-wrap th {
            padding: 6px 10px;
            border-bottom: 2px solid var(--hairline);
            text-align: left;
            font-weight: 600;
            color: var(--charcoal);
            font-size: 12px;
        }

        .message .data-table-wrap td {
            padding: 6px 10px;
            border-bottom: 1px solid var(--hairline);
        }

        .message strong {
            font-weight: 600;
        }

        /* Lists in messages */
        .message ul, .message ol {
            margin: var(--space-2) 0;
            padding-left: var(--space-5);
        }

        .message li {
            margin-bottom: var(--space-1);
        }

        /* ---------- TYPING INDICATOR ---------- */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: var(--canvas);
            padding: var(--space-3) var(--space-5);
            border-radius: var(--rounded-lg);
            box-shadow: var(--shadow-lift);
            margin-left: var(--space-8);
            margin-bottom: var(--space-2);
        }

        .typing-indicator.show {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .typing-indicator .typing-label {
            font-size: 12px;
            color: var(--charcoal);
            font-weight: 500;
            margin-right: var(--space-1);
        }

        .typing-indicator .dot {
            width: 7px;
            height: 7px;
            background: var(--steel);
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-8px); }
        }

        /* ---------- INPUT BAR (sticky bottom) ---------- */
        .chat-input-bar {
            padding: var(--space-4) var(--space-8);
            border-top: 1px solid var(--hairline);
            background: var(--canvas);
            flex-shrink: 0;
            box-shadow: 0 -2px 8px rgba(26,26,26,0.04);
        }

        .chat-input-inner {
            display: flex;
            gap: var(--space-3);
            max-width: 100%;
            align-items: center;
        }

        .chat-input-inner input {
            flex: 1;
            border: 1px solid var(--steel);
            border-radius: var(--rounded-sm);
            padding: var(--space-3) var(--space-4);
            font-family: var(--font-ui);
            font-size: 14px;
            font-weight: 400;
            height: 44px;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
            background: var(--canvas);
            color: var(--ink);
        }

        .chat-input-inner input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(2, 74, 216, 0.12);
        }

        .chat-input-inner input::placeholder {
            color: var(--steel);
        }

        .btn-send {
            background: var(--primary);
            color: var(--on-ink);
            border: none;
            border-radius: var(--rounded-sm);
            padding: 0 var(--space-6);
            height: 44px;
            font-family: var(--font-ui);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            cursor: pointer;
            transition: background 0.15s;
            display: flex;
            align-items: center;
            gap: var(--space-2);
            white-space: nowrap;
        }

        .btn-send:hover {
            background: var(--primary-hover);
        }

        .btn-send:disabled {
            background: var(--steel);
            color: var(--on-ink);
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-send i {
            font-size: 16px;
        }

        /* ---------- FOOTER (ink background) ---------- */
        .footer {
            background: var(--ink);
            padding: var(--space-6) var(--space-8);
            text-align: center;
            font-size: 13px;
            color: var(--steel);
            flex-shrink: 0;
            border-top: 1px solid var(--hairline);
        }

        .footer a {
            color: var(--on-ink);
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        /* ---------- SCROLLBAR ---------- */
        .chat-messages::-webkit-scrollbar,
        .sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track,
        .sidebar::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb,
        .sidebar::-webkit-scrollbar-thumb {
            background: var(--steel);
            border-radius: 3px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover,
        .sidebar::-webkit-scrollbar-thumb:hover {
            background: var(--charcoal);
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 1024px) {
            .sidebar {
                width: 220px;
            }
            .message {
                max-width: 85%;
            }
        }

        @media (max-width: 768px) {
            .app-layout {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                flex-direction: row;
                flex-wrap: wrap;
                padding: var(--space-3) var(--space-4);
                border-right: none;
                border-bottom: 1px solid var(--hairline);
                max-height: 140px;
                overflow-y: auto;
            }
            .sidebar-section {
                padding: 0;
                margin-bottom: var(--space-3);
                width: 100%;
            }
            .sidebar-section-header {
                margin-bottom: var(--space-2);
            }
            .topic-btn {
                padding: var(--space-2) var(--space-4);
                font-size: 13px;
                width: auto;
                border-left: none;
                border-radius: var(--rounded-sm);
            }
            .topic-btn.active {
                border-left: none;
                background: var(--primary-light);
            }
            .sidebar-divider {
                margin: var(--space-2) 0;
            }
            .history-item {
                display: none;
            }
            .message {
                max-width: 92%;
                font-size: 14px;
            }
            .chat-messages {
                padding: var(--space-4);
            }
            .chat-input-bar {
                padding: var(--space-3) var(--space-4);
            }
            .chat-header {
                padding: var(--space-3) var(--space-4);
            }
            .nav-bar {
                padding: 0 var(--space-4);
            }
            .nav-bar-links {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .nav-bar-brand .brand-name {
                font-size: 16px;
            }
            .chat-input-inner {
                gap: var(--space-2);
            }
            .btn-send {
                padding: 0 var(--space-4);
                font-size: 12px;
            }
            .chat-header-info p {
                display: none;
            }
            .sidebar {
                max-height: 100px;
            }
            .topic-btn {
                font-size: 12px;
                padding: var(--space-1) var(--space-3);
            }
        }
    </style>
</head>
<body>

    <!-- ==================== UTILITY STRIP (ink, thin) ==================== -->
    <div class="utility-strip"></div>

    <!-- ==================== NAV BAR ==================== -->
    <header class="nav-bar">
        <div class="nav-bar-inner">
            <a href="index.html" class="nav-bar-brand">
                <div class="brand-icon"><i class="bi bi-hurricane"></i></div>
                <span class="brand-name">Pavithra<span>Bot</span></span>
            </a>
            <ul class="nav-bar-links">
                <li><a href="index.html">Portfolio</a></li>
                <li><a href="#" onclick="resetChat(); return false;">New Conversation</a></li>
            </ul>
        </div>
    </header>

    <!-- ==================== APP LAYOUT ==================== -->
    <div class="app-layout">

        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-section-header">Topics</div>
                <button class="topic-btn active" data-topic="sql-select">
                    <span class="topic-icon">🗂️</span> SQL: SELECT
                </button>
                <button class="topic-btn" data-topic="sql-where">
                    <span class="topic-icon">🔍</span> SQL: WHERE
                </button>
                <button class="topic-btn" data-topic="sql-count">
                    <span class="topic-icon">🔢</span> SQL: COUNT
                </button>
                <button class="topic-btn" data-topic="sql-groupby">
                    <span class="topic-icon">📊</span> SQL: GROUP BY
                </button>
                <button class="topic-btn" data-topic="sql-orderby">
                    <span class="topic-icon">📏</span> SQL: ORDER BY
                </button>
                <div class="sidebar-divider"></div>
                <button class="topic-btn" data-topic="excel-sum">
                    <span class="topic-icon">🧮</span> Excel: SUM &amp; AVERAGE
                </button>
                <button class="topic-btn" data-topic="excel-charts">
                    <span class="topic-icon">📈</span> Excel: Charts
                </button>
                <button class="topic-btn" data-topic="excel-sort">
                    <span class="topic-icon">🔃</span> Excel: Sort &amp; Filter
                </button>
            </div>

            <div class="sidebar-section" id="historySection">
                <div class="sidebar-section-header">Conversation</div>
                <div id="conversationHistory">
                    <!-- Populated by JS -->
                </div>
            </div>
        </aside>

        <!-- CHAT AREA -->
        <main class="chat-area" id="chatArea">
            <div class="chat-header">
                <div class="chat-header-avatar"><i class="bi bi-magic"></i></div>
                <div class="chat-header-info">
                    <h2>Master Thalassos</h2>
                    <p>The 1,247-year-old Data Analysis Sage</p>
                </div>
                <div class="chat-header-status" id="statusIndicator">
                    <span class="dot"></span> AI Ready
                </div>
            </div>

            <div class="chat-messages" id="chatMessages">
                <!-- Messages injected by JS -->
            </div>

            <div class="typing-indicator" id="typingIndicator">
                <span class="typing-label">Master Thalassos is thinking</span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>

            <div class="chat-input-bar">
                <div class="chat-input-inner">
                    <input type="text" id="chatInput" placeholder="Ask Master Thalassos anything about SQL or Excel..." autofocus />
                    <button class="btn-send" id="btnSend" onclick="handleUserInput()">
                        <i class="bi bi-send-fill"></i> Send
                    </button>
                </div>
            </div>
        </main>

    </div>

    <!-- ==================== FOOTER (ink) ==================== -->
    <footer class="footer">
        <p>PavithraBot &copy; 2026 — Built with warmth for slow learners. <a href="index.html">Back to Portfolio</a></p>
    </footer>

    <script>
        // ============================================================
        // PavithraBot — ChatGPT-style Conversational AI
        // Master Thalassos, the 1,247-year-old Data Teacher
        // ============================================================

        // ---------- STATE ----------
        let currentTopic = 'sql-select';
        let conversationHistory = [];
        let sidebarHistoryItems = [];

        // ---------- OPENROUTER CONFIG ----------
        const OPENROUTER_API_KEY = (typeof OPENROUTER_KEY !== 'undefined') ? OPENROUTER_KEY : '';
        const OPENROUTER_MODEL = 'mistralai/mistral-7b-instruct:free';
        let aiAvailable = false;
        let isProcessing = false;

        const TEACHER_SYSTEM_PROMPT = `You are Master Thalassos, a 1,247-year-old teacher of data analysis. You are currently teaching a beginner student SQL and Excel basics in a tool called PavithraBot.

RULES:
- Speak with warmth, patience, and occasional dry humour.
- Use simple analogies (filing cabinets, index cards, magic grids).
- Never introduce more than one new concept per message.
- Keep responses under 4 sentences unless explaining an example.
- Never write more than 8 lines of code in an example.
- If asked about something outside SQL/Excel basics (Python, ML, etc.), say "That is a wonderful question for another day. Let us master these first."
- Use analogies: SELECT = opening a filing cabinet, WHERE = filtering cards, COUNT = counting the pile, GROUP BY = sorting coins, JOIN = two tables holding hands.
- Excel is "the magic grid", cells have addresses like B2.
- End some responses with a gentle question to keep the student engaged.
- NEVER say "this is obvious" or "just do it". Be encouraging.
- Refer to the student as "my friend" or "learner".
- The current lesson topic is: {topic}`;

        function getSystemPrompt() {
            const lesson = lessons[currentTopic];
            const topicName = lesson ? lesson.title : 'SQL & Excel basics';
            return TEACHER_SYSTEM_PROMPT.replace('{topic}', topicName);
        }

        async function callOpenRouter(userMessage) {
            const messages = [
                { role: 'system', content: getSystemPrompt() },
                ...conversationHistory.slice(-10),
                { role: 'user', content: userMessage }
            ];

            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + OPENROUTER_API_KEY,
                        'HTTP-Referer': 'https://Parafounder01.github.io/DataAnalysis-teacher-/pavithrabot.html',
                        'X-Title': 'PavithraBot'
                    },
                    body: JSON.stringify({
                        model: OPENROUTER_MODEL,
                        messages: messages,
                        max_tokens: 400,
                        temperature: 0.7
                    })
                });

                if (!response.ok) {
                    const err = await response.text();
                    console.error('OpenRouter error:', err);
                    return null;
                }

                const data = await response.json();
                const reply = data.choices?.[0]?.message?.content;
                if (reply) {
                    conversationHistory.push({ role: 'user', content: userMessage });
                    conversationHistory.push({ role: 'assistant', content: reply });
                    updateHistorySidebar();
                    return reply;
                }
                return null;
            } catch (e) {
                console.error('OpenRouter fetch failed:', e);
                return null;
            }
        }

        // ---------- DOM REFS ----------
        const messagesEl = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const btnSend = document.getElementById('btnSend');
        const typingEl = document.getElementById('typingIndicator');
        const statusIndicator = document.getElementById('statusIndicator');
        const historyContainer = document.getElementById('conversationHistory');

        // ---------- LESSON DATA (used for sidebar topics & context) ----------
        const lessons = {
            'sql-select': {
                title: 'SQL: SELECT — Opening the Filing Cabinet',
                greeting: 'Welcome, learner. Today we open the filing cabinet. In SQL, the way we "look at" a table is with the word SELECT. Think of it like saying "show me everything in this drawer."',
                analogy: 'SELECT is like walking up to a filing cabinet, pulling open a drawer, and saying "show me every card in here." The table is the drawer, SELECT is your command to open it.',
                example: 'Here is a tiny table called "sales":',
                data: {
                    headers: ['Flavor', 'Price', 'Sold'],
                    rows: [
                        ['Vanilla', '$3', '120'],
                        ['Chocolate', '$3.50', '95'],
                        ['Strawberry', '$4', '70'],
                        ['Mango', '$3.50', '110'],
                    ]
                },
                sql: 'SELECT * FROM sales;',
                sqlExplain: 'The * means "all columns." So this says: show me every row and every column from the sales table.',
                chart: { type: 'bar', labels: ['Vanilla', 'Chocolate', 'Strawberry', 'Mango'], values: [120, 95, 70, 110], label: 'Units Sold' }
            },
            'sql-where': {
                title: 'SQL: WHERE — The Filter',
                greeting: 'Ah, welcome back, my friend. Now that you can open the cabinet, let us learn to find only what we need. The WHERE clause is your filter — like saying "only show me the vanilla cards."',
                analogy: 'WHERE is like going through the filing cabinet and pulling out only the cards that say "Vanilla" on them. You are filtering the whole pile down to just what matches.',
                data: {
                    headers: ['Flavor', 'Price', 'Sold'],
                    rows: [
                        ['Vanilla', '$3', '120'],
                        ['Chocolate', '$3.50', '95'],
                        ['Strawberry', '$4', '70'],
                        ['Mango', '$3.50', '110'],
                    ]
                },
                sql: "SELECT * FROM sales WHERE flavor = 'Vanilla';",
                sqlExplain: "WHERE flavor = 'Vanilla' means: only give me rows where the flavor column equals 'Vanilla'. Notice the single quotes around Vanilla — text values need quotes in SQL.",
                chart: { type: 'bar', labels: ['Vanilla', 'Chocolate', 'Strawberry', 'Mango'], values: [120, 95, 70, 110], label: 'Units Sold (filtered)' }
            },
            'sql-count': {
                title: 'SQL: COUNT — How Many?',
                greeting: 'Welcome, learner. Sometimes we do not need to see every detail — we just want to know: how many? That is what COUNT does. It is like asking "how many cards are in this pile?"',
                analogy: 'Imagine you have a stack of index cards. You do not read each one — you just count them. COUNT does the same for rows in a table.',
                data: {
                    headers: ['Flavor', 'Price', 'Sold'],
                    rows: [
                        ['Vanilla', '$3', '120'],
                        ['Chocolate', '$3.50', '95'],
                        ['Strawberry', '$4', '70'],
                        ['Mango', '$3.50', '110'],
                    ]
                },
                sql: 'SELECT COUNT(*) FROM sales;',
                sqlExplain: 'COUNT(*) counts every row in the table. The answer is 4 — because we have 4 flavors.',
                chart: { type: 'doughnut', labels: ['Vanilla', 'Chocolate', 'Strawberry', 'Mango'], values: [120, 95, 70, 110], label: 'Count Distribution' }
            },
            'sql-groupby': {
                title: 'SQL: GROUP BY — Sorting Coins into Piles',
                greeting: 'Welcome. Today we learn to sort things into piles. GROUP BY is like taking a handful of mixed coins and grouping them — pennies here, nickels there, dimes over there.',
                analogy: 'Imagine you have a box of fruit: apples, bananas, and oranges mixed together. GROUP BY would separate them into three piles so you can count how many of each you have.',
                data: {
                    headers: ['Flavor', 'Sold'],
                    rows: [
                        ['Vanilla', '120'],
                        ['Chocolate', '95'],
                        ['Strawberry', '70'],
                        ['Mango', '110'],
                    ]
                },
                sql: 'SELECT flavor, COUNT(*) FROM sales GROUP BY flavor;',
                sqlExplain: 'We SELECT the flavor column and COUNT. GROUP BY flavor means "make one pile for each unique flavor."',
                chart: { type: 'bar', labels: ['Vanilla', 'Chocolate', 'Strawberry', 'Mango'], values: [1, 1, 1, 1], label: 'Count per Flavor' }
            },
            'sql-orderby': {
                title: 'SQL: ORDER BY — Line Them Up',
                greeting: 'Ah, welcome, learner. Now we learn to arrange things neatly. ORDER BY is like lining up children by height — shortest to tallest, or tallest to shortest.',
                analogy: 'If you have a stack of papers and you want to sort them by date, you would shuffle through and put the oldest on top. ORDER BY does that automatically.',
                data: {
                    headers: ['Flavor', 'Sold'],
                    rows: [
                        ['Vanilla', '120'],
                        ['Chocolate', '95'],
                        ['Strawberry', '70'],
                        ['Mango', '110'],
                    ]
                },
                sql: 'SELECT * FROM sales ORDER BY sold DESC;',
                sqlExplain: 'ORDER BY sold DESC means "sort by the sold column, highest to lowest." ASC (ascending) would go lowest to highest.',
                chart: { type: 'bar', labels: ['Strawberry', 'Chocolate', 'Mango', 'Vanilla'], values: [70, 95, 110, 120], label: 'Sorted (ascending)' }
            },
            'excel-sum': {
                title: 'Excel: SUM & AVERAGE — The Built-in Calculator',
                greeting: 'Welcome, my friend. Today we visit the magic grid — Excel. Every cell has an address, like B2 or C5. And Excel has built-in calculators called formulas. SUM adds everything up. AVERAGE finds the middle.',
                analogy: 'SUM is like pouring all your coins into one big bucket and counting the total. AVERAGE is like "if we shared everything equally, how much would each person get?"',
                data: {
                    headers: ['Day', 'Sales'],
                    rows: [
                        ['Monday', '$200'],
                        ['Tuesday', '$150'],
                        ['Wednesday', '$300'],
                        ['Thursday', '$250'],
                        ['Friday', '$400'],
                    ]
                },
                sql: '=SUM(B2:B6)  =AVERAGE(B2:B6)',
                sqlExplain: '=SUM(B2:B6) adds up all numbers in cells B2 through B6. =AVERAGE(B2:B6) finds the average. The colon (:) means "all cells between B2 and B6."',
                chart: { type: 'line', labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'], values: [200, 150, 300, 250, 400], label: 'Daily Sales ($)' }
            },
            'excel-charts': {
                title: 'Excel: Charts — Turn Numbers into Pictures',
                greeting: 'Welcome, learner. Numbers are wonderful, but the human eye loves pictures. Charts turn your rows of numbers into bars, lines, or pie slices that you can understand at a glance.',
                analogy: 'Imagine reading a list of temperatures for each month — now imagine seeing those temperatures as a line going up and down. The line tells you the story faster than the numbers ever could.',
                data: {
                    headers: ['Month', 'Sales'],
                    rows: [
                        ['Jan', '$1,200'],
                        ['Feb', '$1,500'],
                        ['Mar', '$1,800'],
                        ['Apr', '$2,100'],
                        ['May', '$2,400'],
                    ]
                },
                sql: 'Select data → Insert → Chart → Choose type',
                sqlExplain: 'In Excel: highlight your data, click "Insert", choose a chart type (bar, line, pie). Excel draws it for you.',
                chart: { type: 'line', labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May'], values: [1200, 1500, 1800, 2100, 2400], label: 'Monthly Sales ($)' }
            },
            'excel-sort': {
                title: 'Excel: Sort & Filter — Find What You Need',
                greeting: 'Welcome, my friend. In the magic grid, when you have too many rows, you need ways to find things quickly. Sort arranges your data in order. Filter hides everything except what matches.',
                analogy: 'Sort is like alphabetizing your bookshelf. Filter is like pulling out only the red books and hiding the rest — they are still there, you just cannot see them.',
                data: {
                    headers: ['Product', 'Category', 'Price'],
                    rows: [
                        ['Laptop', 'Electronics', '$999'],
                        ['Desk', 'Furniture', '$299'],
                        ['Mouse', 'Electronics', '$25'],
                        ['Chair', 'Furniture', '$449'],
                        ['Keyboard', 'Electronics', '$79'],
                    ]
                },
                sql: 'Data → Sort → Pick column. Data → Filter → Click dropdown → Uncheck items.',
                sqlExplain: 'Sort: go to Data tab, click Sort, pick which column to sort by. Filter: click the Filter button, then use the dropdown arrows in each column header.',
                chart: { type: 'bar', labels: ['Laptop', 'Desk', 'Mouse', 'Chair', 'Keyboard'], values: [999, 299, 25, 449, 79], label: 'Price ($)' }
            }
        };

        // ---------- TEACHER INTROS ----------
        const teacherIntro = [
            "Welcome, learner. I am Master Thalassos. I have been teaching data since before the printing press. Do not rush — we go one step at a time, and I will be here for every question. Ask me anything about SQL or Excel.",
            "Ah, a new student! Welcome, my friend. I have taught data to merchants in Alexandria and accountants in Beijing. You are in good hands. What would you like to learn today?",
            "Greetings, learner. Pull up a chair. In my 1,247 years, I have learned one thing: everyone can understand data if it is explained with patience. That is what we will do here. Feel free to ask me anything."
        ];

        // ---------- WELCOME MESSAGE ON TOPIC SELECT ----------
        const topicGreetings = {
            'sql-select': "Ah, you want to open the filing cabinet! Let me show you how SELECT works. In SQL, SELECT is how we ask a table to show us its contents. It is like opening a drawer and looking inside. Go ahead — ask me anything about SELECT.",
            'sql-where': "The WHERE clause! This is how we filter our data — like telling the filing cabinet 'only show me the cards that matter.' You can combine it with SELECT to get exactly what you need. What would you like to know?",
            'sql-count': "COUNT is a wonderful tool. Sometimes you just need to know how many rows exist — like counting the number of cards in a drawer without reading each one. Ask me how it works!",
            'sql-groupby': "GROUP BY is like sorting mixed coins into separate piles. It lets you organize your data into groups and then perform calculations on each group. What would you like to learn about grouping?",
            'sql-orderby': "ORDER BY is how we sort things — from A to Z, largest to smallest. It is the difference between a messy pile and a neat stack. Curious about how it works?",
            'excel-sum': "Ah, the magic grid! SUM and AVERAGE are Excel's built-in calculators. They save you from having to add numbers manually. Ask me anything about Excel formulas!",
            'excel-charts': "Charts turn boring numbers into beautiful pictures. A bar chart, a line graph — these tell stories that rows of numbers simply cannot. What would you like to know about charting?",
            'excel-sort': "Sort and Filter are your best friends when you have too much data. Sort arranges things neatly. Filter hides what you do not need. Ask me how they work!"
        };

        // ---------- INITIALIZATION ----------
        function init() {
            aiAvailable = !!OPENROUTER_API_KEY && OPENROUTER_API_KEY.startsWith('sk-or-');
            updateStatusIndicator();
            conversationHistory = [];
            sidebarHistoryItems = [];

            // Show welcome message
            if (!aiAvailable) {
                addTeacherMessage('Note: I am running in <strong>offline mode</strong> because no API key is configured. To enable AI-powered conversations, copy <code>config.example.js</code> to <code>config.js</code> and add your OpenRouter API key. I will still respond with my built-in knowledge.');
            }

            const welcomeIdx = Math.floor(Math.random() * teacherIntro.length);
            addTeacherMessage(teacherIntro[welcomeIdx]);

            // Suggest a topic
            setTimeout(() => {
                addTeacherMessage('You can ask me anything about SQL or Excel, or click a topic on the left to get started!');
            }, 600);
        }

        function updateStatusIndicator() {
            if (aiAvailable) {
                statusIndicator.innerHTML = '<span class="dot"></span> AI Ready';
            } else {
                statusIndicator.innerHTML = '<span class="dot offline"></span> Limited Mode';
            }
        }

        // ---------- MESSAGE HELPERS ----------
        function addTeacherMessage(text, options = {}) {
            const div = document.createElement('div');
            div.className = 'message teacher';

            // Format the content
            let content = text;

            // Handle markdown bold
            content = content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

            // Handle inline code
            content = content.replace(/`([^`]+)`/g, '<code>$1</code>');

            // Handle code blocks (```...```)
            content = content.replace(/```(\w*)\n?([\s\S]*?)```/g, function(match, lang, code) {
                const label = lang ? `<span class="code-label">${lang}</span>` : '';
                return `<div class="code-block">${label}${code.trim()}</div>`;
            });

            // Check if this is an introductory lesson message with data
            if (options.showData) {
                const lesson = lessons[currentTopic];
                if (lesson && lesson.data) {
                    let tableHtml = '<div class="msg-label">📋 Example Data</div><div class="data-table-wrap">';
                    tableHtml += '<table><thead><tr>';
                    lesson.data.headers.forEach(h => {
                        tableHtml += `<th>${h}</th>`;
                    });
                    tableHtml += '</tr></thead><tbody>';
                    lesson.data.rows.forEach(r => {
                        tableHtml += '<tr>';
                        r.forEach(c => {
                            tableHtml += `<td>${c}</td>`;
                        });
                        tableHtml += '</tr>';
                    });
                    tableHtml += '</tbody></table></div>';
                    content += tableHtml;
                }
            }

            // Check if we need to show SQL example
            if (options.showSql) {
                const lesson = lessons[currentTopic];
                if (lesson && lesson.sql) {
                    content += `<div class="code-block" style="margin-top:12px;"><span class="code-label">SQL</span>${lesson.sql}</div>`;
                    if (lesson.sqlExplain) {
                        content += `<p style="margin-top:6px; font-size:14px; color:var(--charcoal);">${lesson.sqlExplain}</p>`;
                    }
                }
            }

            // Check if we need to show analogy
            if (options.showAnalogy) {
                const lesson = lessons[currentTopic];
                if (lesson && lesson.analogy) {
                    content = `<em style="display:block; margin-bottom:var(--space-2); padding:var(--space-2) var(--space-3); border-left:3px solid var(--primary); background:var(--cloud); border-radius:4px; font-size:14px;">💡 ${lesson.analogy}</em>` + content;
                }
            }

            div.innerHTML = `<div class="msg-label"><i class="bi bi-magic" style="font-size:12px;"></i> Master Thalassos</div>${content}`;
            messagesEl.appendChild(div);
            scrollToBottom();
        }

        function addLearnerMessage(text) {
            const div = document.createElement('div');
            div.className = 'message learner';
            div.textContent = text;
            messagesEl.appendChild(div);
            scrollToBottom();
        }

        function scrollToBottom() {
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        // ---------- TYPING INDICATOR ----------
        function showTyping(callback) {
            typingEl.classList.add('show');
            scrollToBottom();

            setTimeout(async () => {
                if (callback) {
                    const result = callback();
                    if (result && typeof result.then === 'function') {
                        await result;
                    }
                }
                typingEl.classList.remove('show');
                scrollToBottom();
            }, 600);
        }

        // ---------- SIDEBAR HISTORY ----------
        function updateHistorySidebar() {
            historyContainer.innerHTML = '';
            // Show last 5 unique topics from conversation
            const seen = new Set();
            const items = [];
            for (let i = conversationHistory.length - 1; i >= 0; i--) {
                const msg = conversationHistory[i];
                if (msg.role === 'user') {
                    const preview = msg.content.length > 35 ? msg.content.substring(0, 35) + '…' : msg.content;
                    if (!seen.has(preview)) {
                        seen.add(preview);
                        items.push({ text: preview, index: i });
                    }
                }
                if (items.length >= 5) break;
            }
            items.reverse();

            if (items.length === 0) {
                historyContainer.innerHTML = '<div style="padding:var(--space-2) var(--space-5); font-size:12px; color:var(--steel);">No messages yet</div>';
                return;
            }

            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `<span class="history-dot"></span><span class="history-label">${item.text}</span>`;
                // Click scrolls to approximate position (not a true jump, but gives the idea)
                div.addEventListener('click', () => {
                    // Re-focus chat
                    chatInput.focus();
                });
                historyContainer.appendChild(div);
            });
        }

        // ---------- TOPIC SELECTION ----------
        function switchTopic(topicKey) {
            if (isProcessing) return;
            const lesson = lessons[topicKey];
            if (!lesson) return;

            currentTopic = topicKey;

            // Update sidebar active state
            document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.topic-btn[data-topic="${topicKey}"]`)?.classList.add('active');

            // Add a teacher message about the topic
            const greeting = topicGreetings[topicKey] || lesson.greeting;

            showTyping(() => {
                addTeacherMessage(`📚 **${lesson.title}**`, { showAnalogy: true, showData: true, showSql: true });
                addTeacherMessage(greeting);
                scrollToBottom();
            });
        }

        // ---------- USER INPUT HANDLER ----------
        async function handleUserInput() {
            const text = chatInput.value.trim();
            if (!text || isProcessing) return;

            isProcessing = true;
            btnSend.disabled = true;
            chatInput.disabled = true;

            // Display user message
            addLearnerMessage(text);
            chatInput.value = '';

            // Show typing indicator and get AI response
            showTyping(async () => {
                let reply = null;

                // Try OpenRouter AI first
                if (aiAvailable) {
                    reply = await callOpenRouter(text);
                }

                if (reply) {
                    // Format and display the AI response
                    addTeacherMessage(reply);
                } else {
                    // Fallback response (minimal, just for when API fails)
                    const lower = text.toLowerCase();
                    if (lower.includes('hello') || lower.includes('hi') || lower.includes('hey')) {
                        addTeacherMessage('Hello again, my friend! Would you like to explore ' + lessons[currentTopic].title + ' or ask me something specific?');
                    } else if (lower.includes('thank')) {
                        addTeacherMessage('You are most welcome, learner. The joy of teaching is watching you grow. What else would you like to know?');
                    } else if (lower.includes('sql') || lower.includes('select') || lower.includes('where') || lower.includes('count')) {
                        addTeacherMessage('Ah, SQL! Let me share my wisdom. In my 1,247 years, I have seen many query languages come and go, but SQL remains. Ask me anything about it, and I will explain with a simple analogy.');
                    } else if (lower.includes('excel') || lower.includes('sum') || lower.includes('chart') || lower.includes('formula')) {
                        addTeacherMessage('The magic grid! Excel is a wonderful companion to SQL. Want to know how to use SUM, AVERAGE, or create charts? Just ask, and I will show you.');
                    } else if (lower.includes('help') || text.includes('?')) {
                        addTeacherMessage('I am here to help, my friend. You can ask me anything about SQL or Excel. Want to start with a topic from the sidebar?');
                    } else {
                        addTeacherMessage('That is an interesting thought. Could you tell me more? I am here to help you learn SQL and Excel, one step at a time. Ask me a question or pick a topic from the sidebar.');
                    }
                }

                isProcessing = false;
                btnSend.disabled = false;
                chatInput.disabled = false;
                chatInput.focus();
            });
        }

        // ---------- RESET ----------
        function resetChat() {
            if (isProcessing) return;
            messagesEl.innerHTML = '';
            conversationHistory = [];
            currentTopic = 'sql-select';

            // Reset sidebar active
            document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.topic-btn[data-topic="sql-select"]`)?.classList.add('active');

            init();
        }

        // ---------- EVENT LISTENERS ----------
        // Sidebar topic clicks
        document.querySelectorAll('.topic-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                switchTopic(btn.dataset.topic);
            });
        });

        // Send button
        btnSend.addEventListener('click', handleUserInput);

        // Enter key in input
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleUserInput();
            }
        });

        // ---------- START ----------
        init();
    </script>
</body>
</html>
